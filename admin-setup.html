<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理员账户初始化</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: #16213e; border-radius: 12px; padding: 32px; max-width: 500px; width: 100%; }
    h1 { font-size: 1.2rem; margin-bottom: 20px; }
    label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 4px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #333; border-radius: 6px; background: #0f0f23; color: #eee; margin-bottom: 16px; outline: none; }
    input:focus { border-color: #6c63ff; }
    button { width: 100%; padding: 12px; background: #6c63ff; color: #fff; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #5a52d5; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .result { margin-top: 20px; background: #0f0f23; border-radius: 6px; padding: 16px; word-break: break-all; font-family: monospace; font-size: 0.85rem; line-height: 1.8; }
    .result .pub { color: #4ade80; }
    .warn { color: #fbbf24; font-size: 0.8rem; margin-top: 12px; }
    .error { color: #f87171; margin-top: 12px; font-size: 0.85rem; }
    .status { color: #aaa; margin-top: 12px; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>管理员账户初始化工具</h1>
    <label>别名（固定）</label>
    <input id="alias" value="blacklist-admin" readonly />
    <label>管理员密码</label>
    <input id="password" type="password" placeholder="输入管理员密码" />
    <button id="btn" onclick="init()">创建管理员账户</button>
    <div id="output"></div>
  </div>

  <script type="module">
    import gun, { user } from './src/lib/gun.js'
    import { createAdminAccount } from './src/lib/sea.js'

    window.init = async function () {
      const btn = document.getElementById('btn')
      const output = document.getElementById('output')
      const alias = document.getElementById('alias').value
      const password = document.getElementById('password').value

      if (!password) {
        output.innerHTML = '<p class="error">请输入密码</p>'
        return
      }

      btn.disabled = true
      output.innerHTML = '<p class="status">正在创建账户...</p>'

      try {
        const pair = await createAdminAccount(user, alias, password)
        output.innerHTML = `
          <div class="result">
            <div>公钥 (pub):</div>
            <div class="pub" id="pubkey">${pair.pub}</div>
          </div>
          <p class="warn">
            请复制上方公钥，粘贴到 src/constants/admin.js 中的 ADMIN_PUB_KEY，然后重新构建。<br>
            密码请牢记，Gun 用户系统无法找回密码。
          </p>
        `
        console.log('完整密钥对:', JSON.stringify(pair))
      } catch (e) {
        // 如果用户已存在，尝试登录获取公钥
        if (e.message && e.message.includes('already')) {
          output.innerHTML = '<p class="status">账户已存在，尝试登录获取公钥...</p>'
          try {
            user.auth(alias, password, (ack) => {
              if (ack.err) {
                output.innerHTML = `<p class="error">登录失败：${ack.err}</p>`
                btn.disabled = false
                return
              }
              const pair = user._.sea
              output.innerHTML = `
                <div class="result">
                  <div>账户已存在，公钥 (pub):</div>
                  <div class="pub">${pair.pub}</div>
                </div>
                <p class="warn">
                  请复制上方公钥，粘贴到 src/constants/admin.js 中的 ADMIN_PUB_KEY，然后重新构建。
                </p>
              `
              console.log('完整密钥对:', JSON.stringify(pair))
            })
          } catch (e2) {
            output.innerHTML = `<p class="error">登录失败：${e2.message}</p>`
          }
        } else {
          output.innerHTML = `<p class="error">创建失败：${e.message}</p>`
        }
      }
      btn.disabled = false
    }
  </script>
</body>
</html>
